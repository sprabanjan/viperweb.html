<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Box - Formspree</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f2f2f2;
            font-family:Arial, sans-serif;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            text-align:center;
        }

        input{
            width:300px;
            padding:10px;
            font-size:16px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            margin-top:15px;
            padding:10px 20px;
            font-size:16px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Search Box</h2>

    <form action="https://formspree.io/f/xdaqoqly" method="POST">

        <input
            type="text"
            name="Search_Query"
            placeholder="Enter your search..."
            required
        >

        <br>

        <button type="submit">Search</button>

    </form>

</div>

</body>
</html>
